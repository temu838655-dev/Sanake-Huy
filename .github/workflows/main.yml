name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev cmake wget libncurses6 libstdc++6

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Build APK
        run: |
          # 1. Tạo thư mục cấu hình Android
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # 2. Chạy lệnh build (lần đầu sẽ cài đặt SDK)
          # Thêm biến môi trường để Buildozer tự động chấp nhận license nếu có thể
          buildozer -v android debug
        env:
          # Ép buộc chấp nhận license thông qua biến môi trường của Android SDK
          ANDROID_SDK_HOME: /home/runner/.buildozer/android/platform/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
