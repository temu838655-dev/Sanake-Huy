name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: $HOME/android-sdk
      ANDROID_SDK_ROOT: $HOME/android-sdk
      ANDROIDSDK: $HOME/android-sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git zip unzip wget curl \
            autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev \
            cmake libncurses6 libstdc++6

      - name: Install Buildozer (PINNED)
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36
          pip install python-for-android==2024.1.21

      - name: Setup Android SDK (FIXED 100%)
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk

          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-*.zip

          # FIX chuẩn Google structure (KHÔNG mv bậy)
          mv cmdline-tools latest || true

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

          ls -la $ANDROID_HOME/cmdline-tools/latest/bin

          chmod +x $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: Clean cache (IMPORTANT)
        run: |
          rm -rf .buildozer ~/.buildozer ~/.gradle

      - name: Build APK
        run: |
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          buildozer -v android debug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk