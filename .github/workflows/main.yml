name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: Install deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y git zip unzip wget curl \
            autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev \
            cmake libncurses6 libncursesw5-dev libstdc++6 lld cpuid \
            libtinfo6 libgmp3-dev build-essential xclip \
            libsqlite3-dev liblzma-dev libxml2-dev libxslt1-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36 python-for-android==2024.1.21

      - name: Clean Buildozer Cache
        run: |
          rm -rf ~/.buildozer/android || true
          rm -rf .buildozer || true

      - name: Build APK
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk